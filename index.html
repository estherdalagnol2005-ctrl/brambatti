    <script>
      (function() {
        try {
          var _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return _fetch;
            },
            set: function(val) {
              _fetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('Failed to define fetch setter:', e);
        }
      })();
    </script>
