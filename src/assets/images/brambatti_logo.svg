<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <style>
    .brand-name {
      font-family: 'Playfair Display', 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 600;
      letter-spacing: 0.18em;
      fill: #30372A;
    }
    .brand-sub {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.45em;
      fill: #48523B;
    }
    .divider {
      stroke: #30372A;
      stroke-width: 0.75;
      opacity: 0.25;
    }
  </style>
  <text x="200" y="48" text-anchor="middle" class="brand-name">BRAMBATTI</text>
  <line x1="80" y1="64" x2="320" y2="64" class="divider" />
  <text x="202" y="80" text-anchor="middle" class="brand-sub">DISTRIBUIDORA</text>
</svg>
