<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="100%">
  <style>
    .brambatti-text {
      font-family: 'Playfair Display', 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.18em;
      fill: #E5E0DC;
    }
    .ecosmetics-text {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.05em;
      fill: #E5E0DC;
    }
    .ecosmetics-bold {
      font-weight: 700;
      fill: #48523B;
    }
    .partnership-tag {
      font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.5em;
      fill: #48523B;
    }
    .vertical-line {
      stroke: #E5E0DC;
      stroke-width: 1;
      opacity: 0.25;
    }
  </style>
  
  <!-- Left Side: Brambatti -->
  <text x="240" y="55" text-anchor="end" class="brambatti-text">BRAMBATTI</text>
  <text x="240" y="74" text-anchor="end" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 9px; font-weight: 600; letter-spacing: 0.3em; fill: #E5E0DC; opacity: 0.7;">DISTRIBUIDORA</text>
  
  <!-- Middle Divider -->
  <line x1="300" y1="30" x2="300" y2="85" class="vertical-line" />
  
  <!-- Right Side: Ecosmetics -->
  <text x="360" y="65" text-anchor="start" class="ecosmetics-text">eco<tspan class="ecosmetics-bold">smetics</tspan></text>
  <text x="360" y="82" text-anchor="start" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 8px; font-weight: 700; letter-spacing: 0.2em; fill: #E5E0DC; opacity: 0.6;">SALON EXCLUSIVE</text>

  <!-- Bottom Tag: Parceria Oficial -->
  <text x="300" y="110" text-anchor="middle" class="partnership-tag">PARCERIA OFICIAL</text>
</svg>
